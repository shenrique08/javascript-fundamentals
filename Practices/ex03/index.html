<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beggining with JS</title>

    <style>
        body {
            background-color: aliceblue;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        h1 {
            text-align: center;
        }
    </style>

</head>
<body>

    <h1>Hello, World!</h1>
    <script>
        var string1 = window.prompt("Enter a word: ")
        var string2 = window.prompt("Enter another word")

        document.write(`${string1} has ${string1.length} caracters and ${string2} has ${string2.length} caracters <br>`)
        document.write(`${string1} in uppercase is ${string1.toUpperCase()}`)

    </script>
    
</body>
</html>
