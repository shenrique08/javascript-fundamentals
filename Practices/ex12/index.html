<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>

    <main>
        <section>
            <div>
                <label for="formNumber">Número entre 1 e 100:</label>
                <input type="number" id="formNumber" min="1" max="100">
                <button id="adicionar" type="button" onclick="adicionar()">Adicionar</button>
            </div>

            <textarea id="formArea" cols="20" rows="8" readonly></textarea>
            <br>
            <button id="finalizar" type="button" onclick="finalizar()">Finalizar</button>

            
        </section>
        <div id="resultado"></div>
    </main>

    <footer>
        <p><a href="https://github.com/shenrique08" target="_blank" rel="noopener noreferrer">github/shenrique08</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
