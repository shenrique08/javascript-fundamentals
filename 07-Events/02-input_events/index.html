<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List Tester</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>My Shopping List 🛒</h1>
        </header>

        <section class="input-section">
            <input type="text" id="item-input" placeholder="e.g., Eggs">
            <button id="add-btn">Add Item</button>
        </section>

        <section class="list-section">
            <ul id="shopping-list">
                <li class="list-item">
                    <span>Milk</span>
                    <button class="delete-btn">X</button>
                </li>
                <li class="list-item">
                    <span>Bread</span>
                    <button class="delete-btn">X</button>
                </li>
                <li class="list-item">
                    <span>Cheese</span>
                    <button class="delete-btn">X</button>
                </li>
            </ul>
        </section>
    </div>

    <script src="script.js"></script>

    </body>
</html>
