<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation Test</title>
    <link rel="stylesheet" href="style.css"> </head>
<body class="bg-gray-100 font-sans">

    <header class="bg-blue-500 text-white p-6 rounded-b-lg shadow-md mb-8">
        <h1 id="main-heading" class="text-3xl font-bold text-center">DOM Test Page</h1>
    </header>

    <main class="container mx-auto p-4">
        <section id="section1" class="bg-white p-6 rounded-lg shadow-md mb-6">
            <h2 class="text-2xl font-semibold text-gray-700 mb-3">Section 1</h2>
            <p class="text-gray-600 mb-4">This is the first paragraph in section 1. It has an <strong id="important-text">important</strong> word.</p>
            <button id="changeTextBtn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg shadow transition duration-150 ease-in-out">Change Text</button>
            <button id="toggleColorBtn" class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 px-4 rounded-lg shadow ml-2 transition duration-150 ease-in-out">Toggle Color</button>
        </section>

        <section id="section2" class="bg-white p-6 rounded-lg shadow-md mb-6">
            <h2 class="text-2xl font-semibold text-gray-700 mb-3">Section 2: Item List</h2>
            <ul id="item-list" class="list-disc pl-5 text-gray-600">
                <li class="item p-1">Item 1</li>
                <li class="item p-1">Item 2</li>
                <li class="item p-1">Item 3</li>
            </ul>
            <input type="text" id="newItemText" placeholder="New item text" class="mt-4 p-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
            <button id="addItemBtn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg shadow ml-2 mt-4 sm:mt-0 transition duration-150 ease-in-out">Add Item</button>
        </section>

        <div id="dynamic-content-area" class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-4 rounded-r-lg shadow mb-6" role="alert">
            <p class="font-bold">Dynamic Area</p>
            <p>Content will appear here based on interactions.</p>
        </div>

        <footer class="text-center text-gray-500 mt-10 pb-5">
            <p>&copy; 2025 DOM Testers Inc.</p>
        </footer>
    </main>

    <script src="script1.js"></script>
    <script src="script2.js"></script>
    <script src="script3.js"></script>
</body>
